# Gate confirmation records
gates:
  gate1_requirement:
    status: <pending|confirmed|rejected>
    confirmed_at: null
    notes: null
  gate2_design:
    status: pending
    confirmed_at: null
    notes: null
  gate3_prd:
    status: pending
    confirmed_at: null
    notes: null
  gate4_artifacts:
    status: pending
    confirmed_at: null
    notes: null
  gate5_security_arch:
    status: pending
    confirmed_at: null
    notes: null
  gate6_security_code:
    status: pending
    confirmed_at: null
    notes: null
  final_delivery:
    status: pending
    confirmed_at: null
    notes: null

# Stage 2 parallel execution groups
stage2:
  parallel_groups:
    group_a:
      name: "Concurrent Prototype & Backend"
      tasks: [prototype, backend_arch]
      depends_on: [prd]
      status: pending         # pending | running | completed
      completed_tasks: []
      git_branches:
        prototype: null       # e.g. "fw-prototype-<uuid>"
        backend_arch: null    # e.g. "fw-backend-<uuid>"
    group_b:
      name: "Frontend Architecture"
      tasks: [frontend_arch]
      depends_on: [prototype]
      status: pending
      completed_tasks: []
    group_c:
      name: "Test Cases"
      tasks: [test_case]
      depends_on: [backend_arch]
      status: pending
      completed_tasks: []

# Stage 3 progress: per-module code generation + smoke test
stage3:
  backend_modules: []   # populated from backend_arch, e.g. [{name: "user", status: "done"}, ...]
  frontend_generated: false
  smoke_test:
    attempts: 0
    last_result: null   # pass | fail
    failures: []        # list of failed case ids
    pre_smoke_tag: null # git tag

