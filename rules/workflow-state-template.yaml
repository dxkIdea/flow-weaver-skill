# Fallback log: when a sub-skill fails and we fall back to built-in Chat
fallbacks: []
# Example:
# - stage: prd
#   skill: my-prd-template
#   reason: "skill file missing"
#   fallback_to: built-in-chat
#   timestamp: <ISO-8601>

# Iteration history: every version bump lands here
iterations: []
# Example:
# - artifact: prd
#   from_version: v1
#   to_version: v2
#   reason: "user requested adding notification module"
#   timestamp: <ISO-8601>

# Execution log: detailed audit trail of all workflow activities
execution_log: []
# Example:
# - timestamp: "<ISO-8601>"
#   level: INFO           # DEBUG | INFO | WARN | ERROR
#   stage: stage1
#   activity: "Stage started"
#   duration_ms: null
#   sub_skill: ears-requirement
#   details: "Requirement confirmation initiated"
#   metadata:
#     workflow_id: "<uuid>"
#     artifact_path: "docs/00-requirement/需求确认书.md"
