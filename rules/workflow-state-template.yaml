# Vibe Coding Workflow State File
# This is the single source of truth for pipeline progress.
# Copy this template to docs/workflow-state.yaml at workflow start.

workflow:
  id: <uuid>
  started_at: <ISO-8601>
  last_updated: <ISO-8601>
  current_stage: <env-check|stage1|stage1.3|stage1.5|stage1.6|stage2|stage2.7|stage3|done>
  status: <running|paused_at_gate|failed|completed>
  mode: <full|quick>  # full=10-stage pipeline, quick=dynamic stage trimming by project type

project_type: <microservice|monolith|frontend-only|api-only>

# Quick mode stage trimming rules:
#   frontend-only: skip backend_arch, security (arch level), backend modules in stage3
#   api-only: skip prototype, frontend_arch, frontend code generation
#   microservice: skip product_design (assumed aligned with product team)
#   monolith: full pipeline (default)
quick_mode_trim:
  frontend-only:
    skipped_stages: [product_design, backend_arch, backend_code_generation, security_arch]
    skipped_gates: [gate2_design]
  api-only:
    skipped_stages: [prototype, frontend_arch, frontend_code_generation]
    skipped_gates: []
  microservice:
    skipped_stages: [product_design]
    skipped_gates: [gate2_design]
  monolith:
    skipped_stages: []
    skipped_gates: []

