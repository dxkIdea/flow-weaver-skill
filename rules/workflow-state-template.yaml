# Vibe Coding Workflow State File
# This is the single source of truth for pipeline progress.
# Copy this template to docs/workflow-state.yaml at workflow start.

workflow:
  id: <uuid>
  started_at: <ISO-8601>
  last_updated: <ISO-8601>
  current_stage: <env-check|stage1|stage1.3|stage1.5|stage1.6|stage2|stage2.7|stage3|done>
  status: <running|paused_at_gate|failed|completed>

project_type: <microservice|monolith|frontend-only|api-only>

tech_stack:
  backend: java-spring-boot              # java-spring-boot / go-gin / node-nestjs / python-fastapi
  frontend: react-next                   # react-next / vue-nuxt
  database: postgresql                   # postgresql / mysql / sqlite / mongodb

# Sub-skill configuration. Edit this section to swap a sub-skill mid-pipeline.
skills:
  requirement:
    skill_id: brainstorming
    type: community
    source: https://github.com/obra/superpowers/tree/main/skills/brainstorming
    fallback: built-in-chat
    alternatives: []
    available: null
  product_design:
    skill_id: ui-ux-pro-max
    type: community
    source: https://github.com/nextlevelbuilder/skills
    fallback: built-in-chat
    alternatives: []
    available: null
  prd:
    skill_id: prd-development
    type: community
    source: https://github.com/dingxingkai/pm-skills/tree/main/skills/prd-development
    fallback: built-in-chat
    alternatives: []
    available: null
  prototype:
    skill_id: design-taste-frontend
    type: community
    source: https://github.com/Leonxlnx/taste-skill
    fallback: built-in-chat
    alternatives: []
    available: null
  frontend_arch:
    skill_id: frontend-design
    type: community
    source: https://github.com/anthropics/skills/tree/main/frontend-design
    fallback: built-in-chat
    alternatives: []
    available: null
  backend_arch:
    skill_id: built-in
    type: built-in
    fallback: built-in-chat
    alternatives: []
    available: null
  test_case:
    skill_id: test-driven-development
    type: community
    source: https://github.com/obra/superpowers/tree/main/skills/test-driven-development
    fallback: built-in-chat
    alternatives: []
    available: null
  security:
    skill_id: security-and-hardening
    type: community
    source: (built-in opencode skill)
    fallback: built-in-chat
    alternatives: []
    available: null
  code_generation:
    skill_id: executing-plans
    type: community
    source: https://github.com/obra/superpowers/tree/main/skills/executing-plans
    fallback: built-in-chat
    alternatives: []
    available: null
  cross_review:
    skill_id: doubt-driven-development
    type: community
    source: https://github.com/obra/superpowers/tree/main/skills/doubt-driven-development
    fallback: built-in-chat
    alternatives: []
    available: null

# Environment check results (base check + tech-specific check + code quality tools)
env_check:
  jdk: {installed: false, version: null}
  maven_or_gradle: {installed: false, tool: null}
  node: {installed: false, version: null}
  playwright: {installed: false}
  git: {installed: false}
  go: {installed: false, version: null}
  python: {installed: false, version: null}
  tech_specific: {}
  code_quality: {}
  passed: false

# Sub-skill availability check results (run during env-check)
skill_check:
  passed: false
  unavailable_skills: []
  fallback_required: []

# Tech stack recommendation (generated during Stage 1.5)
tech_stack_recommendation:
  recommended_backend: null
  recommended_frontend: null
  recommended_database: null
  recommendation_reason: null
  feature_matches: []

# Cost & Risk Assessment (generated during Stage 1.6)
assessment:
  cost_estimate:
    development_hours: null
    developer_count: null
    estimated_weeks: null
    difficulty_level: null        # low | medium | high | critical
  risk_assessment:
    technical_risk: null          # low | medium | high
    business_risk: null           # low | medium | high
    schedule_risk: null           # low | medium | high
    quality_risk: null            # low | medium | high
    risks: []
    mitigations: []
  overall_rating: null            # green | yellow | red

# Artifact registry. One entry per produced artifact.
# status: draft | confirmed | stale
artifacts:
  requirement:
    path: docs/00-requirement/需求确认书.md
    version: null
    status: null
    generated_by: null
    generated_at: null
  product_design:
    path: docs/01-product/design-v1.md
    version: null
    status: null
    generated_by: null
    generated_at: null
  prd:
    path: docs/02-prd/prd-v1.md
    version: null
    status: null
    generated_by: null
    generated_at: null
  prototype:
    path: docs/03-prototype/index.html
    version: null
    status: null
    generated_by: null
    generated_at: null
  frontend_arch:
    path: docs/04-frontend/architecture-v1.md
    version: null
    status: null
    generated_by: null
    generated_at: null
  backend_arch:
    path: docs/05-backend/architecture-v1.md
    version: null
    status: null
    generated_by: null
    generated_at: null
    extra:
      openapi: docs/05-backend/openapi.yaml
  test_case:
    path: docs/06-test/cases-v1.md
    version: null
    status: null
    generated_by: null
    generated_at: null
    extra:
      smoke_dir: docs/06-test/smoke/
  security_review:
    path: docs/07-review/review-v1.md
    version: null
    status: null
    generated_by: null
    generated_at: null

# Gate confirmation records
gates:
  gate1_requirement:
    status: <pending|confirmed|rejected>
    confirmed_at: null
    notes: null
  gate2_design:
    status: pending
    confirmed_at: null
    notes: null
  gate3_prd:
    status: pending
    confirmed_at: null
    notes: null
  gate4_artifacts:
    status: pending
    confirmed_at: null
    notes: null
  gate5_security:
    status: pending
    confirmed_at: null
    notes: null
  final_delivery:
    status: pending
    confirmed_at: null
    notes: null

# Stage 2 parallel execution groups
stage2:
  parallel_groups:
    group_a:
      name: "Concurrent Prototype & Backend"
      tasks: [prototype, backend_arch]
      depends_on: [prd]
      status: pending         # pending | running | completed
      completed_tasks: []
    group_b:
      name: "Frontend Architecture"
      tasks: [frontend_arch]
      depends_on: [prototype]
      status: pending
      completed_tasks: []
    group_c:
      name: "Test Cases"
      tasks: [test_case]
      depends_on: [backend_arch]
      status: pending
      completed_tasks: []

# Stage 3 progress: per-module code generation + smoke test
stage3:
  backend_modules: []   # populated from backend_arch, e.g. [{name: "user", status: "done"}, ...]
  frontend_generated: false
  smoke_test:
    attempts: 0
    last_result: null   # pass | fail
    failures: []        # list of failed case ids
    pre_smoke_tag: null # git tag

